[pytest]
; WHY this file exists: tests/test_inference.py does `import inference`, but
; inference.py lives one directory up (in api/, not api/tests/). Without
; telling pytest to add api/ to Python's import search path, that import
; fails with "ModuleNotFoundError: No module named 'inference'" -- the code
; is fine, pytest just doesn't know where to look. `pythonpath = .` adds the
; directory this file lives in (api/) to that search path for every test run.
pythonpath = .
